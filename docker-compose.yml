services:
  postgres:
    image: postgres:16-alpine
    container_name: raizes-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: raizes
      POSTGRES_PASSWORD: raizes
      POSTGRES_DB: raizes
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
